<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./icon.png" type="image/x-icon">
    <title>成信大校园助手 - 知识库管理</title>
    <style>
        /* 核心基础样式与字体 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            font-size: 15px;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #f4f6fc 0%, #eef2fa 100%);
        }
        
        .outline {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: flex-start;
        }
        
        /* 左侧边栏样式 */
        #side_left {
            display: none;
            border-right: 1px solid rgba(25, 84, 142, 0.1);
            width: 300px;
            height: 100%;
            background-color: white;
            flex-shrink: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }
        
        .side_left_flex {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        .head_left {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            border-bottom: 1px solid rgba(209, 209, 209, 0.3);
            background-color: #fafbfc;
            width: 100%;
            height: 60px;
            padding: 10px 20px;
        }
        
        .head_logo {
            border-radius: 10px;
            width: 50px;
            height: 35px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .head_logo img {
            width: 100%;
            height: auto;
        }
        
        .head_font {
            flex-grow: 1;
            font-size: 18px;
            font-weight: 700;
            color: rgb(25, 84, 142);
            padding-left: 15px;
        }
        
        .side_menu {
            display: flex;
            flex-grow: 1;
            width: 100%;
            flex-direction: column;
            background-color: white;
            overflow-y: auto;
            padding: 20px 10px;
        }
        
        .menu_mid {
            display: flex;
            flex-wrap: nowrap;
            width: 100%;
            margin-bottom: 15px;
            gap: 10px;
        }
        
        .menu_mid1, .menu_mid2 {
            flex: 1;
        }
        
        .menu_mid a {
            text-decoration: none;
            display: block;
        }
        
        .func {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 90px;
            border-radius: 16px;
            background-color: white;
            border: 1px solid rgba(25, 84, 142, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }
        
        .func:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(25, 84, 142, 0.1);
            border-color: rgba(25, 84, 142, 0.3);
        }
        
        .func .img {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .side_menu a {
            text-decoration: none;
            margin-bottom: 10px;
            display: block;
        }
        
        .menu_item_row {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 18px;
            border-radius: 12px;
            color: #555;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        
        .menu_item_row:hover {
            background-color: rgba(25, 84, 142, 0.05);
            color: rgb(25, 84, 142);
        }
        
        .menu_item_row.active {
            background-color: rgba(25, 84, 142, 0.1);
            color: rgb(25, 84, 142);
            font-weight: 600;
            border: 1px solid rgba(25, 84, 142, 0.15);
        }
        
        .menu_item_row .img {
            margin-right: 15px;
            display: flex;
            align-items: center;
        }
        
        .menu_font_row {
            font-size: 15px;
        }
        
        /* 右侧工作区 */
        .side_right {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 100%;
            background-color: transparent;
            overflow: hidden;
            position: relative;
        }
        
        /* 头部顶栏 */
        .headline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 60px;
            background-color: white;
            border-bottom: 1px solid rgba(209, 209, 209, 0.3);
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.01);
            flex-shrink: 0;
        }
        
        .headline_hidemenu button {
            background: none;
            border: none;
            cursor: pointer;
            color: rgb(25, 84, 142);
            display: flex;
            align-items: center;
            padding: 5px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        
        .headline_hidemenu button:hover {
            background-color: #f0f2f5;
        }
        
        .headline_head {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        
        .share {
            width: 50px;
        }
        
        /* 主工作面板 (一体化工作台) */
        .dashboard_container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            width: 100%;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }
        
        /* 分栏设计: 左侧控制与上传，右侧节点显示 */
        .panel_left {
            display: flex;
            flex-direction: column;
            width: 45%;
            min-width: 400px;
            gap: 20px;
            height: 100%;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .panel_right {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 100%;
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(25, 84, 142, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }
        
        /* 磨砂玻璃卡片 */
        .glass_card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            border: 1px solid rgba(25, 84, 142, 0.1);
            padding: 20px;
            box-shadow: 0 8px 24px rgba(31, 38, 135, 0.03);
            backdrop-filter: blur(8px);
        }
        
        /* Toast样式 */
        #toast-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            min-width: 250px;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast-success { background: linear-gradient(135deg, #52c41a, #73d13d); }
        .toast-error { background: linear-gradient(135deg, #ff4d4f, #ff7875); }
        .toast-info { background: linear-gradient(135deg, #1890ff, #40a9ff); }
        
        /* 移动端适配 */
        @media (max-width: 1024px) {
            .dashboard_container {
                flex-direction: column;
                overflow-y: auto;
            }
            .panel_left, .panel_right {
                width: 100%;
                height: auto;
                overflow: visible;
            }
            .panel_right {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="outline">
        <!-- 左侧边栏 -->
        <div id="side_left">
            <div class="side_left_flex">
                <div class="head_left">
                    <div class="head_logo">
                        <img src="./logo.png" alt="Logo">
                    </div>
                    <div class="head_font">成信大校园助手</div>
                </div>
                <div class="side_menu">
                    <div class="menu_mid">
                        <div class="menu_mid1">
                            <a href="./manage.html" title="管理 & 增加">
                                <div class="func" style="border-radius: 20px; box-shadow: 0 4px 15px rgba(25, 84, 142, 0.15); border-color: rgba(25, 84, 142, 0.2);">
                                    <div class="img" style="color: rgb(25, 84, 142);">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-house-add" viewBox="0 0 16 16">
                                            <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h4a.5.5 0 1 0 0-1h-4a.5.5 0 0 1-.5-.5V7.207l5-5 6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5Z"/>
                                            <path fill-rule="evenodd" d="M16 12.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Zm-3.5-2a.5.5 0 0 1 .5.5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 1 1-1 0v-1h-1a.5.5 0 1 1 0-1h1v-1a.5.5 0 0 1 .5-.5Z"/>
                                        </svg>
                                    </div>
                                    <div style="font-size: 13px; font-weight: 500; color: rgb(25, 84, 142);">知识库管理</div>
                                </div>
                            </a>
                        </div>
                        <div class="menu_mid2">
                            <a href="./use_function.html" title="食用指南">
                                <div class="func">
                                    <div class="img" style="color: #666;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-compass" viewBox="0 0 16 16">
                                            <path d="M8 16.016a7.5 7.5 0 0 0 1.962-14.74A1 1 0 0 0 9 0H7a1 1 0 0 0-.962 1.276A7.5 7.5 0 0 0 8 16.016zm6.5-7.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"/>
                                            <path d="m6.94 7.44 4.95-2.83-2.83 4.95-4.949 2.83 2.828-4.95z"/>
                                        </svg>
                                    </div>
                                    <div style="font-size: 13px; color: #666;">使用指南</div>
                                </div>
                            </a>
                        </div>
                    </div>
                    
                    <a href="./index.html">
                        <div class="menu_item_row">
                            <div class="img">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-chat-quote" viewBox="0 0 16 16">
                                    <path d="M2.678 11.894a1 1 0 0 1 .287.801 10.97 10.97 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8.06 8.06 0 0 0 8 14c3.996 0 7-2.807 7-6 0-3.192-3.004-6-7-6S1 4.808 1 8c0 1.468.617 2.83 1.678 3.894zm-.493 3.905a21.682 21.682 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a9.68 9.68 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 7-3.582 7-8 7a9.06 9.06 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105z"/>
                                </svg>
                            </div>
                            <div class="menu_font_row">智能聊天</div>
                        </div>
                    </a>
                    
                    <a href="./feed_back.html">
                        <div class="menu_item_row">
                            <div class="img">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-stack-overflow" viewBox="0 0 16 16">
                                    <path d="M12.412 14.572V10.29h1.428V16H1v-5.71h1.428v4.282h9.984z"/>
                                    <path d="M3.857 13.145h7.137v-1.428H3.857v1.428zM10.254 0 9.108.852l4.26 5.727 1.146-.852L10.254 0zm-3.54 3.377 5.484 4.567.913-1.097L7.627 2.28l-.914 1.097zM4.922 6.55l6.47 3.013.603-1.294-6.47-3.013-.603 1.294zm-.925 3.344 6.985 1.469.294-1.398-6.985-1.468-.294 1.397z"/>
                                </svg>
                            </div>
                            <div class="menu_font_row">问题反馈</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        
        <!-- 右侧工作区 -->
        <div class="side_right">
            <div class="headline">
                <div class="headline_hidemenu">
                    <button id="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-arrow-bar-right" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M6 8a.5.5 0 0 0 .5.5h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L12.293 7.5H6.5A.5.5 0 0 0 6 8Zm-2.5 7a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5Z"/>
                        </svg>
                    </button>
                </div>
                <div class="headline_head">知识库管理工作台</div>
                <div class="share"></div>
            </div>
            
            <!-- 核心内容工作区 -->
            <div class="dashboard_container">
                <div class="panel_left" id="panel-left-container">
                    <!-- 占位，Task 2 与 Task 3 将填充这里 -->
                </div>
                <div class="panel_right" id="panel-right-container">
                    <!-- 占位，Task 4 将填充这里 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast 通知浮层 -->
    <div id="toast-container"></div>
    
    <script>
        // 响应式菜单折叠监听
        const button = document.getElementById("button");
        const div = document.getElementById("side_left");

        function adjustSidebar() {
            if (window.innerWidth < 1024) {
                button.style.display = "block";
                div.style.display = "none";
            } else {
                button.style.display = "none";
                div.style.display = "block";
            }
        }

        window.addEventListener("resize", adjustSidebar);
        button.addEventListener("click", function() {
            if (div.style.display === "none" || div.style.display === "") {
                div.style.display = "block";
            } else {
                div.style.display = "none";
            }
        });
        adjustSidebar();
        
        // Toast 工具函数
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            
            // 触发淡入动画
            setTimeout(() => toast.classList.add('show'), 50);
            
            // 3秒后移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
