<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./icon.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <title>成信大校园助手 - 问题反馈</title>
</head>
<body>
    <div class="outline">
        <nav id="side_left"></nav>
        <!-- 右边 -->
        <main class="side_right">
            <header class="headline">
                <div class="headline_hidemenu">
                    <button id="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-arrow-bar-right" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                            <path fill-rule="evenodd" d="M6 8a.5.5 0 0 0 .5.5h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L12.293 7.5H6.5A.5.5 0 0 0 6 8Zm-2.5 7a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5Z"/>
                        </svg>
                    </button>
                </div>
                <div class="headline_head">问题反馈</div>
                <div class="share"></div>
            </header>
            <div class="feedback_container">
                <div class="glass_card feedback_card">
                    <input type="email" id="email" class="feedback_email" placeholder="请输入您的邮箱地址..." required>
                    <textarea id="feedback" cols="10" rows="10" class="feedback_textarea" placeholder="请输入您的宝贵意见..."></textarea>
                    <div class="feedback_submit_wrap">
                        <button class="feedback_submit" id="feedbackButton" onclick="submitFeedback()">
                            提交反馈
                        </button>
                    </div>
                </div>
            </div>
            <div id="toast-container" class="feedback-top"></div>
        </main>
    </div>

    <script type="module" src="./src/sidebar.ts" data-active="feed_back"></script>
    <script src="./feedback.js"></script>
</body>
</html>
