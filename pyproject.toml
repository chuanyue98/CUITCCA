[project]
name = "cuitcca"
version = "0.2.0"
description = "校园AI助手 - CUIT Campus AI Assistant"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.139.0",
    "uvicorn>=0.50.2",
    "python-dotenv>=1.1.0",
    "python-multipart>=0.0.32",
    "pydantic[email]>=2.9.0",
    "aiofiles>=24.1.0",
    "openai>=2.45.0",
    "llama-index-core>=0.14.23",
    "llama-index-embeddings-huggingface>=0.5.0",
    "llama-index-llms-openai>=0.4.0",
    "llama-index-readers-file>=0.2.0",
    "langchain>=0.3.0",
    "langchain-community>=0.3.0",
    "langchain-text-splitters>=0.3.0",
    "requests>=2.34.2",
    "pandas>=2.2.3",
    "python-docx>=1.1.0",
    "pdfplumber>=0.11.10",
    "tiktoken>=0.13.0",
    "orjson>=3.11.9",
    "PyYAML>=6.0.3",
    "networkx>=3.6.1",
    "xlrd>=2.0.2",
    "XlsxWriter>=3.2.9",
    "tqdm>=4.68.3",
    "llama-index-llms-openai-like>=0.4.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/ChuanYuei/CUITCCA"
